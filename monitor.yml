name: NetFile SFO Filings Monitor

on:
  schedule:
    # Runs every hour (adjust as needed — lobbyist filings aren't real-time)
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual runs from the Actions tab

permissions:
  contents: write # Needed to commit seen_filings.json back to the repo

jobs:
  check-filings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run filing checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_filings.py

      - name: Commit updated seen_filings.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_filings.json
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: update seen filings [skip ci]"
          git push
